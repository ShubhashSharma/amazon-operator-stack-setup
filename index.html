<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Connect your Amazon seller account to Claude Code. Built for Seller Sessions Live 2026 by not a square." />
  <meta name="theme-color" content="#06b6d4" />
  <title>amazon-operator-stack — guided setup</title>

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%2306b6d4'/%3E%3Crect x='6' y='22' width='14' height='2' rx='1' fill='white'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ────────────────────────────────────────────────────────
       Reset + design tokens
    ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:        #06b6d4;
      --teal-dark:   #0891b2;
      --teal-soft:   #ecfeff;
      --teal-line:   #67e8f9;

      --ink-1:       #0f172a;
      --ink-2:       #334155;
      --ink-3:       #64748b;
      --ink-4:       #94a3b8;

      --paper:       #ffffff;
      --bg:          #fafafa;
      --line:        #e2e8f0;
      --line-soft:   #f1f5f9;

      --good:        #10b981;
      --warn:        #f59e0b;
      --bad:         #ef4444;

      --shadow-card: 0 1px 2px rgba(15, 23, 42, 0.04), 0 8px 24px rgba(15, 23, 42, 0.06);
      --shadow-pop:  0 12px 40px rgba(15, 23, 42, 0.10);

      --radius-sm:   8px;
      --radius:      12px;
      --radius-lg:   16px;
    }

    html { font-size: 16px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-feature-settings: 'cv02','cv03','cv04','cv11';
      color: var(--ink-1);
      background: var(--bg);
      min-height: 100vh;
      line-height: 1.5;
    }

    code, pre { font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace; font-size: 0.875rem; }

    a { color: var(--teal-dark); text-decoration: none; }
    a:hover { text-decoration: underline; text-underline-offset: 3px; }

    /* ────────────────────────────────────────────────────────
       Layout
    ──────────────────────────────────────────────────────── */
    .page { max-width: 880px; margin: 0 auto; padding: 32px 24px 80px; }

    header.top {
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding-bottom: 24px;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--line);
    }
    header.top .brand {
      font-weight: 600;
      font-size: 1.0625rem;
      letter-spacing: -0.01em;
      color: var(--ink-1);
      position: relative;
      padding-bottom: 4px;
    }
    header.top .brand::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: 0;
      width: 28px;
      height: 2px;
      background: var(--teal);
      border-radius: 2px;
    }
    header.top .by {
      font-size: 0.8125rem;
      color: var(--ink-4);
      margin-left: auto;
    }
    header.top .by a { color: var(--ink-3); }

    /* ────────────────────────────────────────────────────────
       Progress bar
    ──────────────────────────────────────────────────────── */
    .progress {
      display: flex;
      gap: 6px;
      margin-bottom: 32px;
      align-items: center;
    }
    .progress .step-pip {
      flex: 1;
      height: 4px;
      background: var(--line);
      border-radius: 4px;
      transition: background 200ms ease;
    }
    .progress .step-pip.done { background: var(--teal); }
    .progress .step-pip.active { background: var(--teal); }

    .step-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--ink-4);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .step-meta strong { color: var(--teal-dark); font-weight: 600; }

    /* ────────────────────────────────────────────────────────
       Card
    ──────────────────────────────────────────────────────── */
    .card {
      background: var(--paper);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      padding: 40px 44px;
      animation: cardIn 280ms ease;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card h1 {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.025em;
      color: var(--ink-1);
      margin-bottom: 12px;
    }

    .card .lede {
      font-size: 1rem;
      color: var(--ink-3);
      margin-bottom: 28px;
      max-width: 60ch;
    }

    /* About this step block */
    .why-block {
      background: var(--teal-soft);
      border-left: 3px solid var(--teal);
      padding: 16px 20px;
      border-radius: var(--radius-sm);
      margin-bottom: 28px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px 16px;
      font-size: 0.9375rem;
    }
    .why-block .label {
      color: var(--ink-3);
      font-weight: 500;
      font-size: 0.8125rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      align-self: start;
      padding-top: 2px;
    }
    .why-block .text { color: var(--ink-2); }

    /* Instruction note */
    .note {
      background: var(--line-soft);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin: 24px 0;
      font-size: 0.9375rem;
      color: var(--ink-2);
    }
    .note h4 {
      font-size: 0.8125rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-3);
      margin-bottom: 12px;
    }
    .note ol {
      padding-left: 18px;
      margin: 0;
    }
    .note ol li { margin-bottom: 8px; }
    .note ol li:last-child { margin-bottom: 0; }
    .note .small {
      display: block;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px dashed var(--line);
      color: var(--ink-3);
      font-size: 0.875rem;
    }
    .note code {
      background: var(--paper);
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid var(--line);
      color: var(--ink-1);
    }

    /* Forms */
    .field { margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--ink-2);
      margin-bottom: 6px;
    }
    .field .hint {
      font-size: 0.8125rem;
      color: var(--ink-3);
      margin-bottom: 8px;
    }
    .field input[type="text"],
    .field input[type="password"],
    .field select,
    .field textarea {
      width: 100%;
      padding: 12px 16px;
      font-family: inherit;
      font-size: 0.9375rem;
      color: var(--ink-1);
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      transition: border-color 150ms ease, box-shadow 150ms ease;
      font-feature-settings: 'cv02','cv03','cv04','cv11';
    }
    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      outline: none;
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.15);
    }
    .field input.invalid {
      border-color: var(--bad);
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.10);
    }
    .field .error {
      display: none;
      font-size: 0.8125rem;
      color: var(--bad);
      margin-top: 6px;
    }
    .field.show-error .error { display: block; }

    /* Choice cards (radio / checkbox in card form) */
    .choice-list { display: grid; gap: 10px; margin-bottom: 24px; }
    .choice {
      display: flex;
      gap: 14px;
      padding: 16px 20px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      cursor: pointer;
      transition: border-color 120ms ease, background 120ms ease;
      background: var(--paper);
    }
    .choice:hover { border-color: var(--ink-4); }
    .choice.selected {
      border-color: var(--teal);
      background: var(--teal-soft);
      box-shadow: inset 0 0 0 1px var(--teal);
    }
    .choice .indicator {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid var(--ink-4);
      flex-shrink: 0;
      margin-top: 2px;
      position: relative;
      transition: border-color 120ms ease;
    }
    .choice.selected .indicator { border-color: var(--teal); }
    .choice.selected .indicator::after {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: var(--teal);
    }
    .choice.checkbox .indicator { border-radius: 4px; }
    .choice.checkbox.selected .indicator::after {
      inset: 2px;
      border-radius: 2px;
    }
    .choice .body { flex: 1; }
    .choice .body .title { font-weight: 500; color: var(--ink-1); margin-bottom: 2px; }
    .choice .body .sub   { font-size: 0.875rem; color: var(--ink-3); }

    /* Buttons */
    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 22px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 120ms ease, color 120ms ease;
    }
    .btn.primary {
      background: var(--teal);
      color: white;
    }
    .btn.primary:hover { background: var(--teal-dark); }
    .btn.primary:disabled {
      background: var(--ink-4);
      cursor: not-allowed;
    }
    .btn.ghost {
      background: transparent;
      color: var(--ink-3);
    }
    .btn.ghost:hover { color: var(--ink-1); }
    .btn .arrow { font-size: 1.05em; line-height: 1; }

    /* Pre-flight check rows */
    .check-list { display: grid; gap: 10px; margin-bottom: 24px; }
    .check-row {
      display: flex;
      gap: 14px;
      align-items: center;
      padding: 14px 18px;
      background: var(--line-soft);
      border-radius: var(--radius-sm);
      font-size: 0.9375rem;
    }
    .check-row .icon {
      width: 22px; height: 22px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .check-row .icon.good { background: var(--good); }
    .check-row .icon.warn { background: var(--warn); }
    .check-row .label { color: var(--ink-2); }

    /* Probe matrix preview */
    .probe-list { display: grid; gap: 8px; }
    .probe-row {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 12px 16px;
      background: var(--line-soft);
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      color: var(--ink-2);
    }
    .probe-row .tick { color: var(--good); font-weight: 700; }

    /* Final / download */
    .download-card {
      background: linear-gradient(135deg, var(--teal-soft), #f0fdfa);
      border-radius: var(--radius-lg);
      padding: 32px;
      text-align: center;
      margin-bottom: 28px;
    }
    .download-card .filename {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9375rem;
      color: var(--ink-2);
      margin-bottom: 18px;
    }
    .download-card .btn {
      padding: 14px 28px;
      font-size: 1rem;
    }

    .next-steps {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
    }
    .next-steps h4 {
      font-size: 0.8125rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-3);
      margin-bottom: 14px;
    }
    .next-steps pre {
      background: var(--ink-1);
      color: #e2e8f0;
      padding: 14px 18px;
      border-radius: var(--radius-sm);
      overflow-x: auto;
      margin: 8px 0;
      font-size: 0.8125rem;
      line-height: 1.6;
    }
    .next-steps pre .comment { color: #94a3b8; }
    .next-steps pre .accent  { color: #67e8f9; }

    /* Restart row */
    .restart-row {
      text-align: center;
      margin-top: 24px;
      font-size: 0.8125rem;
      color: var(--ink-4);
    }
    .restart-row a {
      color: var(--ink-4);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .restart-row a:hover { color: var(--ink-2); }

    /* Footer */
    footer.bot {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
      font-size: 0.8125rem;
      color: var(--ink-4);
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    /* Mobile tightening */
    @media (max-width: 640px) {
      .page { padding: 20px 16px 64px; }
      .card { padding: 28px 22px; }
      .card h1 { font-size: 1.4rem; }
      .actions { flex-direction: column-reverse; align-items: stretch; }
      .actions .btn { justify-content: center; }
    }

    /* Expandable details panel for Amazon's questionnaire help */
    details.help-panel {
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: var(--radius);
      margin: 24px 0;
      overflow: hidden;
    }
    details.help-panel > summary {
      padding: 14px 20px;
      cursor: pointer;
      font-size: 0.9375rem;
      font-weight: 500;
      color: #92400e;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 10px;
      user-select: none;
    }
    details.help-panel > summary::-webkit-details-marker { display: none; }
    details.help-panel > summary::before {
      content: '?';
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      background: #fbbf24;
      color: white;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.8125rem;
    }
    details.help-panel[open] > summary { border-bottom: 1px solid #fde68a; }
    details.help-panel .qa-list {
      padding: 16px 20px 20px;
      display: grid;
      gap: 16px;
      font-size: 0.9375rem;
    }
    details.help-panel .qa { display: grid; gap: 6px; }
    details.help-panel .q {
      font-weight: 500;
      color: var(--ink-1);
    }
    details.help-panel .q::before {
      content: 'Q';
      display: inline-block;
      width: 18px;
      height: 18px;
      background: var(--ink-3);
      color: white;
      border-radius: 4px;
      font-size: 0.6875rem;
      text-align: center;
      line-height: 18px;
      margin-right: 8px;
      vertical-align: 1px;
    }
    details.help-panel .a {
      color: var(--ink-2);
      padding: 10px 14px;
      background: var(--paper);
      border-radius: var(--radius-sm);
      border-left: 3px solid var(--good);
      font-size: 0.9rem;
      line-height: 1.55;
    }

    /* Save-and-finish-later ghost row */
    .save-later {
      text-align: center;
      margin-top: 16px;
      font-size: 0.8125rem;
      color: var(--ink-3);
    }
    .save-later a {
      color: var(--teal-dark);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* Save-later modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fadeIn 200ms ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: var(--paper);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-pop);
      padding: 36px 36px 32px;
      max-width: 460px;
      margin: 16px;
      animation: cardIn 240ms ease;
    }
    .modal h3 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.015em;
      color: var(--ink-1);
      margin-bottom: 10px;
    }
    .modal p { color: var(--ink-2); font-size: 0.9375rem; margin-bottom: 14px; }
    .modal .url {
      background: var(--line-soft);
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8125rem;
      color: var(--ink-1);
      margin-bottom: 18px;
      word-break: break-all;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    /* Privacy badge */
    .privacy {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: var(--teal-soft);
      color: var(--teal-dark);
      font-size: 0.75rem;
      font-weight: 500;
      border-radius: 999px;
      margin-bottom: 16px;
    }
    .privacy::before {
      content: '●';
      font-size: 0.6em;
      line-height: 1;
    }
  </style>
</head>

      <div class="brand">amazon-operator-stack</div>

    <div class="progress" id="progress"></div>

    <div id="card-host"></div>

    <div class="restart-row">
      Want a clean slate? <a href="#" id="restart-link">Reset and start over</a>.
    </div>

    <footer class="bot">
      <div>
        Privacy-by-design. Your refresh token never leaves this browser. <a href="https://github.com/ShubhashSharma/amazon-operator-stack-setup" target="_blank" rel="noopener">View source</a>.

        <a href="https://github.com/ShubhashSharma/amazon-operator-stack" target="_blank" rel="noopener">CLI repo</a> · MIT
      </div>
    </footer>
  </div>

  <script>
    // ════════════════════════════════════════════════════════
    //  REFERENCE DATA (mirrors src/wizard/marketplaces.ts)
    // ════════════════════════════════════════════════════════

    //  STATE
    // ════════════════════════════════════════════════════════
    const STORAGE_KEY = 'aos-setup-state-v1';

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        return JSON.parse(raw);
      } catch { return null; }
    }
    function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    function resetState() { localStorage.removeItem(STORAGE_KEY); location.reload(); }

    let state = loadState() || {
      step: 1,
      region: null,
      primaryMarketplaceId: null,
      enabledMarketplaceIds: [],

      refreshToken: '',

    //  RENDER ENGINE
    // ════════════════════════════════════════════════════════
    const STEPS = [

      { n: 2, title: 'Pick your region',                render: renderStep2 },
      { n: 3, title: 'Pick your marketplaces',          render: renderStep3 },

      { n: 7, title: 'Download your .env',              render: renderStep7 },
    ];

    function go(n) {
      state.step = Math.max(1, Math.min(STEPS.length, n));
      saveState();
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function render() {
      // Progress + meta
      const total = STEPS.length;
      const cur = state.step;
      document.getElementById('step-current').textContent = cur;
      document.getElementById('step-title-meta').textContent = STEPS[cur - 1].title;

      const progress = document.getElementById('progress');
      progress.innerHTML = '';
      for (let i = 1; i <= total; i++) {
        const pip = document.createElement('div');
        pip.className = 'step-pip ' + (i < cur ? 'done' : i === cur ? 'active' : '');
        progress.appendChild(pip);
      }

      // Card body
      const host = document.getElementById('card-host');
      host.innerHTML = '';
      const card = document.createElement('div');
      card.className = 'card';
      host.appendChild(card);
      STEPS[cur - 1].render(card);
    }

    // ════════════════════════════════════════════════════════
    //  HELPERS
    // ════════════════════════════════════════════════════════
    function el(tag, attrs = {}, ...children) {
      // Forgiving signature: if 2nd arg is a string or DOM node, treat as a child
      // and skip attrs. Caught a bug in step 6 where I passed text as attrs.
      if (typeof attrs === 'string' || attrs instanceof Node) {
        children = [attrs, ...children];
        attrs = {};
      }
      const e = document.createElement(tag);
      for (const [k, v] of Object.entries(attrs)) {
        if (k === 'class') e.className = v;
        else if (k === 'html') e.innerHTML = v;
        else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2), v);
        else e.setAttribute(k, v);
      }
      for (const c of children.flat()) {
        if (c == null) continue;
        e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      }
      return e;
    }

    function whyBlock(why, next) {
      return el('div', { class: 'why-block' },
        el('div', { class: 'label' }, 'Why we ask'),
        el('div', { class: 'text' }, why),
        el('div', { class: 'label' }, 'What happens next'),
        el('div', { class: 'text' }, next),
      );
    }

    function actionsBar(opts) {
      const wrap = el('div', { class: 'actions' });
      const back = el('button', { class: 'btn ghost', onclick: opts.onBack || (() => go(state.step - 1)) },
        el('span', { class: 'arrow' }, '←'),
        el('span', {}, opts.backLabel || 'Back'),
      );
      if (state.step === 1 || opts.hideBack) back.style.visibility = 'hidden';

      const next = el('button', { class: 'btn primary', onclick: opts.onNext },
        el('span', {}, opts.nextLabel || 'Continue'),
        el('span', { class: 'arrow' }, '→'),
      );
      if (opts.disabled) next.disabled = true;
      if (opts.nextId) next.id = opts.nextId;

      wrap.appendChild(back);
      wrap.appendChild(next);
      return wrap;
    }

    // ════════════════════════════════════════════════════════
    function generateEnv() {
      const region = REGIONS[state.region];
      const primary = MARKETPLACES.find(m => m.id === state.primaryMarketplaceId);
      const enabledIds = state.enabledMarketplaceIds.length
        ? state.enabledMarketplaceIds.join(',')
        : primary.id;

      return [
        `# Generated by amazon-operator-stack guided setup at ${new Date().toISOString()}`,
        `# Do not commit this file. It contains credentials specific to your seller account.`,
        ``,
        `# SP-API — LWA app credentials`,
        `SP_API_CLIENT_ID=${state.clientId}`,
        `SP_API_CLIENT_SECRET=${state.clientSecret}`,
        `SP_API_REFRESH_TOKEN=${state.refreshToken}`,
        ``,
        `# SP-API — primary marketplace + region`,
        `SP_API_MARKETPLACE_ID=${primary.id}`,
        `SP_API_MARKETPLACE_CODE=${primary.code}`,
        `SP_API_ENABLED_MARKETPLACE_IDS=${enabledIds}`,
        `SP_API_REGION=${region.spApiAwsRegion}`,
        `SP_API_ENDPOINT=${region.spApiEndpoint}`,
        ``,
        `# Ads API — set these when you finish the homework in HOMEWORK.md`,
        `ADS_API_CLIENT_ID=not-configured`,
        `ADS_API_CLIENT_SECRET=not-configured`,
        `ADS_API_REFRESH_TOKEN=not-configured`,
        `ADS_API_REGION=${state.region}`,
        `ADS_API_ENDPOINT=${region.adsApiEndpoint}`,
        `ADS_PROFILE_ID=`,
        ``,
        `# Operator stack`,
        `LOG_LEVEL=info`,
        ``,
      ].join('\n');
    }

    function downloadEnv() {
      const blob = new Blob([generateEnv()], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      // Some browsers strip leading dots from download names. Using a safe name
      // and instructing the user to rename it in the next-steps block.
      const a = el('a', { href: url, download: 'amazon-operator-stack.env' });
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function nextStepsCmd() {
      return [
        '<span class="comment"># 1. Drop the downloaded file into the repo, renaming it to .env</span>',
        'mv ~/Downloads/amazon-operator-stack.env ~/code/amazon-operator-stack/.env',
        '',
        '<span class="comment"># 2. Confirm everything works against your real seller account</span>',
        'cd ~/code/amazon-operator-stack',
        '<span class="accent">npm run smoke-test</span>',
        '',
        '<span class="comment"># 3. Wire the MCP server into Claude Code</span>',
        '<span class="accent">npm run wire-claude</span>',
        '',
        '<span class="comment"># 4. Restart Claude Code, then start asking questions.</span>',
      ].join('\n');
    }

    function sampleQueries() {
      return [
        '<span class="comment"># Yesterday’s revenue</span>',
        '"Pull my Amazon orders from the last 24 hours and total the revenue."',
        '',
        '<span class="comment"># Top 5 SKUs by revenue this week</span>',
        '"Pull the last 7 days of orders, group by SKU, sort by revenue."',
        '',
        '<span class="comment"># Reconcile against Seller Central</span>',
        '"List financial events from yesterday, sum the shipment events, and tell me what to expect in my next payout."',
      ].join('\n');
    }

    // ════════════════════════════════════════════════════════
    //  VALIDATORS
    // ════════════════════════════════════════════════════════
    function isValidClientId(v)     { return /^amzn1\..{20,}$/.test(v); }
    function isValidClientSecret(v) { return v.length >= 20; }
    function isValidRefreshToken(v) { return v.startsWith('Atzr|') && v.length >= 100; }
    function maskTail(v, keep = 8)  {
      if (!v) return '';
      if (v.length <= keep + 4) return v;
      return v.slice(0, 6) + '••••' + v.slice(-keep);
    }

    // ════════════════════════════════════════════════════════
    //  SAVE-LATER MODAL
    // ════════════════════════════════════════════════════════
    function showSaveLater() {
      saveState();
      const url = location.origin + location.pathname;
      const backdrop = el('div', { class: 'modal-backdrop', onclick: e => {
        if (e.target === backdrop) document.body.removeChild(backdrop);
      } });
      const modal = el('div', { class: 'modal' },
        el('h3', {}, 'Saved on this device.'),
        el('p', {}, "We've saved your answers in this browser. To finish later, just open this URL on the same device and same browser — you'll pick up exactly where you left off."),
        el('div', { class: 'url' }, url),
        el('p', { style: 'font-size:0.875rem; color:var(--ink-3); margin-bottom:18px;' }, 'Bookmark it now if you might forget. The save is local to this browser, so don\'t expect it to follow you to a different device.'),
        el('div', { class: 'modal-actions' },
          el('button', { class: 'btn ghost', onclick: () => document.body.removeChild(backdrop) }, 'Close'),
          el('button', { class: 'btn primary', onclick: () => {
            navigator.clipboard?.writeText(url).catch(() => {});
            document.body.removeChild(backdrop);
          } }, 'Copy URL + close'),
        ),
      );
      backdrop.appendChild(modal);
      document.body.appendChild(backdrop);
    }

    // ════════════════════════════════════════════════════════
    //  WIRE UP
    // ════════════════════════════════════════════════════════
    document.getElementById('restart-link').addEventListener('click', e => {
      e.preventDefault();
      if (confirm('Reset all answers and start over?')) resetState();
    });

    render();
  </script>
</body>
</html>
